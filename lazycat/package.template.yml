package: cloud.lazycat.app.lazy-taskchampion
version: ${VERSION}
name: TaskChampion Sync Server
description: Taskwarrior 的同步服务 (TaskChampion sync-server)
author: GothenburgBitFactory
license: MIT
homepage: https://github.com/microlazy-apps/lazy-taskchampion

unsupported_platforms:
  - ios
  - android

locales:
  zh-CN:
    name: TaskChampion Sync Server
    description: Taskwarrior 3.x+ 的官方同步服务端 —— 给 task / vit 等客户端做端到端加密的多机同步。
    usage: |
      ## 这是什么

      TaskChampion 是 Taskwarrior (3.x+) 用来存储任务的底层数据库 —— 任务
      数据 + 多副本同步协议。本应用是它的**同步服务端**，让你在多台机器
      上运行 `task` / `vit` 时数据保持同步。

      数据在客户端本地用 `sync.encryption_secret` 加密后才上传 —— 服务端
      看不到任务正文，只存密文增量。

      ## 客户端配置（taskwarrior / vit）

      装好后，每台需要同步的机器执行：

      ```bash
      # client_id 标识「你这份任务数据」，所有 replica 共用同一个 UUID
      CID=$(uuidgen)

      # 自选一个加密 secret，所有 replica 必须用同一个
      SEC=$(pwgen -s 32 1)

      task config sync.server.url       https://taskchampion.<your-box>.heiyu.space
      task config sync.server.client_id $CID
      task config sync.encryption_secret $SEC

      task sync   # 首次同步
      ```

      > 注意：TaskChampion 在 server 端按 `client_id` 隔离 history
      > 链。所有 replica 必须填**同一个** `client_id` 才能看到对方
      > 推的任务，不是「每台一个」。

      ### vit

      vit 是 Taskwarrior 的终端 UI，本身**不做同步**，所有同步靠
      `task sync`。在 vit 里按大写 `S` 就等价于在 shell 跑 `task sync`，
      读的是同一份 `~/.taskrc`。所以上面三行配好之后 vit 也就同步好了。

      想要 vit 启动/退出时自动同步，在 `~/.vit/config.ini` 写：

      ```ini
      [vit]
      sync_on_start = true
      sync_on_end = true
      ```

      ## 多设备同步

      第 2、3、N 台机器：填**同一个** `sync.server.client_id` 和
      **同一个** `sync.encryption_secret`（与首台一致），跑 `task sync`，
      本地 replica 自动从服务端拉取并合并密文增量。

      ## 客户端 ID 白名单（可选）

      默认这台 sync 服务器接受任意 `client_id` 注册（保护交给加密 secret）。
      如果你想强制只允许某一个 UUID 注册，安装时在「客户端 ID 白名单」
      字段填上那个 UUID。留空 = 允许任意 UUID。

      ## 数据

      - 服务端只存 SQLite + 加密 blob，放在 `/lzcapp/var/persist`，
        重装容器不丢
      - 任务正文加密在客户端完成，服务端看不到明文
      - 想备份：复制 `/lzcapp/var/persist` 目录就行
  en:
    name: TaskChampion Sync Server
    description: Official sync server for Taskwarrior 3.x+ — end-to-end encrypted multi-replica sync for `task` / `vit` and any TaskChampion-backed client.
    usage: |
      ## What this is

      TaskChampion is the task DB + replication protocol behind Taskwarrior 3.x+.
      This app is its **sync server side**, so your `task` / `vit` installs on
      laptop, desktop, and phone stay in sync.

      Tasks are encrypted client-side with `sync.encryption_secret` before
      upload — the server stores opaque encrypted deltas only.

      ## Client setup (taskwarrior / vit)

      On every replica:

      ```bash
      # client_id identifies *the task dataset*, not the machine.
      # ALL replicas share the same UUID.
      CID=$(uuidgen)

      # one shared encryption secret across ALL replicas
      SEC=$(pwgen -s 32 1)

      task config sync.server.url       https://taskchampion.<your-box>.heiyu.space
      task config sync.server.client_id $CID
      task config sync.encryption_secret $SEC

      task sync   # initial push
      ```

      > NOTE: TaskChampion isolates history chains *per client_id* on
      > the server. All replicas must use the **same** `client_id` to
      > see each other's tasks — not one UUID per machine.

      ### vit

      vit is Taskwarrior's curses TUI; it does **not** sync directly. Pressing
      capital `S` inside vit just shells out to `task sync` using your
      `~/.taskrc`. Configure taskwarrior as above and vit picks it up.

      To auto-sync on vit start/quit, in `~/.vit/config.ini`:

      ```ini
      [vit]
      sync_on_start = true
      sync_on_end = true
      ```

      ## Adding replicas

      For the 2nd, 3rd, ... machine: use the **same** `sync.server.client_id`
      and **same** `sync.encryption_secret` as the first replica, then run
      `task sync`. Your local replica pulls and merges the encrypted deltas
      from the server.

      ## Client-ID allowlist (optional)

      By default this server accepts any `client_id` (security is provided by
      the encryption secret). To pin the server to a single UUID, fill in the
      "Client ID allowlist" param at install time. Leave it blank to allow any
      UUID to register.

      ## Data

      - Server stores SQLite + encrypted blobs under `/lzcapp/var/persist`,
        survives container reinstalls
      - Server never sees plaintext; all encryption happens client-side
      - To back up: copy the `/lzcapp/var/persist` directory
